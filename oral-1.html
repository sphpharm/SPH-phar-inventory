<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智慧藥櫃離線盤點</title>
  <style>
    :root {
      --bg: #E9E9E7;
      --panel: #F4F4F2;
      --ink: #111111;
      --muted: #7A7A77;
      --line: #D5D5D1;
      --line-strong: #C6C6C1;
      --blue: #111111;
      --blue-dark: #000000;
      --green: #9FAF9F;
      --amber: #b7791f;
      --red: #c2413a;
      --shadow: 0 18px 44px rgba(39, 36, 30, .12);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      min-height: 44px;
      padding: 0 14px;
      color: #fff;
      background: var(--blue);
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
    }

    button:hover { background: var(--blue-dark); }
    button:active { transform: translateY(1px); }
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(51, 65, 85, .22);
      outline-offset: 2px;
    }

    .button-secondary {
      color: var(--ink);
      background: #F4F4F2;
      border: 1px solid #dad7d1;
    }

    .button-secondary:hover { background: #E3E3DF; }

    .button-danger {
      background: var(--red);
    }

    .button-danger:hover {
      background: #a8322c;
    }

    .button-small {
      min-height: 36px;
      padding: 0 10px;
      font-size: 14px;
    }

    .icon-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      min-width: 38px;
      min-height: 38px;
      padding: 0;
      color: #111111;
      background: #F28C28;
      border: 1px solid rgba(242, 140, 40, .92);
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(242, 140, 40, .22), inset 0 1px 0 rgba(255, 255, 255, .34);
      font-size: 21px;
      font-weight: 840;
      line-height: 1;
    }

    .icon-action-btn:hover {
      background: #E57F1F;
    }

    .icon-action-btn:active {
      background: #D97318;
      box-shadow: 0 5px 12px rgba(242, 140, 40, .18), inset 0 1px 0 rgba(255, 255, 255, .24);
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px clamp(14px, 3vw, 28px);
      background: rgba(244, 244, 242, .94);
      border-bottom: 0;
      box-shadow: 0 8px 24px rgba(17, 17, 17, .055);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(19px, 3vw, 25px);
      line-height: 1.12;
      letter-spacing: 0;
      font-weight: 780;
    }

    .brand span {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .save-monitor {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-left: auto;
      width: 30px;
      height: 24px;
      padding: 0;
      color: #67635d;
      background: #E2E2DE;
      border: 1px solid rgba(255, 255, 255, .74);
      border-radius: 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .86), 0 8px 18px rgba(17, 17, 17, .07);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      white-space: nowrap;
    }

    .save-lamp {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #D98935;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, .58), 0 0 0 2px rgba(217, 137, 53, .08), 0 0 7px rgba(217, 137, 53, .24);
      opacity: .76;
    }

    .save-monitor.is-saving .save-lamp {
      animation: saveLampPulse 820ms steps(1, end) 1;
    }

    @keyframes saveLampPulse {
      0%, 100% {
        opacity: .76;
        transform: scale(1);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, .58), 0 0 0 2px rgba(217, 137, 53, .08), 0 0 7px rgba(217, 137, 53, .24);
      }
      9%, 23%, 37%, 62% {
        opacity: .32;
        transform: scale(.94);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, .28), 0 0 0 1px rgba(217, 137, 53, .05), 0 0 4px rgba(217, 137, 53, .12);
      }
      14%, 30%, 48%, 70% {
        opacity: .96;
        transform: scale(1.08);
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, .72), 0 0 0 4px rgba(217, 137, 53, .13), 0 0 14px rgba(217, 137, 53, .44);
      }
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .mobile-actions {
      display: none;
    }

    .main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px clamp(12px, 3vw, 28px) 24px;
      display: grid;
      grid-template-columns: minmax(320px, 520px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 6px 22px rgba(39, 36, 30, .055);
    }

    .cabinet-panel {
      padding: 16px;
      transition: filter .22s ease, opacity .22s ease;
    }

    body.modal-open .cabinet-panel {
      filter: blur(4px);
      opacity: .82;
    }

    .cabinet-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 720 / 1080;
      max-height: calc(100vh - 140px);
      display: grid;
      place-items: center;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cabinet-line {
      fill: rgba(249, 249, 247, .88);
      stroke: #8a8987;
      stroke-width: 1.45;
      vector-effect: non-scaling-stroke;
    }

    .cabinet-detail {
      fill: none;
      stroke: #999894;
      stroke-width: 1.05;
      vector-effect: non-scaling-stroke;
    }

    .cabinet-soft {
      fill: rgba(244, 244, 241, .82);
      stroke: #999894;
      stroke-width: 1.05;
      vector-effect: non-scaling-stroke;
    }

    .hit-area {
      fill: rgba(141, 134, 123, .04);
      stroke: rgba(141, 134, 123, .16);
      stroke-width: 1.45;
      vector-effect: non-scaling-stroke;
      cursor: pointer;
    }

    .hit-area:hover,
    .hit-area.active {
      fill: rgba(173, 163, 148, .20);
      stroke: rgba(111, 103, 93, .72);
    }

    .hit-area.done {
      fill: rgba(159, 175, 159, .42);
      stroke: rgba(137, 158, 141, .82);
    }

    .drawer-label,
    .shelf-label {
      pointer-events: none;
      font-size: 18px;
      fill: #111111;
      font-weight: 700;
    }

    .work-panel {
      overflow: hidden;
    }

    .close-list-btn {
      display: none;
    }

    .section-head {
      padding: 16px 16px 13px;
      background: #F4F4F2;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .section-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .section-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .progress {
      min-width: 90px;
      text-align: right;
      color: var(--muted);
      font-size: 13px;
    }

    .drug-strip {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      overflow-x: auto;
      padding: 14px 20px 32px;
      scroll-padding-left: 20px;
      scroll-snap-type: x proximity;
      min-height: 150px;
      background: #E4E4E0;
    }

    .drug-card {
      flex: 0 0 min(250px, 78vw);
      min-height: 116px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .92);
      scroll-snap-align: start;
      text-align: left;
      color: var(--ink);
      box-shadow: 0 12px 26px rgba(17, 17, 17, .085);
    }

    .drug-card:hover {
      background: #faf9f6;
      border-color: #d3d0ca;
      box-shadow: 0 14px 30px rgba(17, 17, 17, .11);
    }

    .drug-card.done {
      border-color: rgba(137, 158, 141, .84);
      background: #f2f4f0;
      box-shadow: 0 14px 30px rgba(137, 158, 141, .24), 0 8px 18px rgba(17, 17, 17, .075);
    }

    .drug-card strong {
      display: block;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .drug-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .empty-state {
      padding: 20px 16px 28px;
      color: var(--muted);
      line-height: 1.7;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px 14px 16px;
      background: #E4E4E0;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .summary-item {
      padding: 14px 18px;
      background: #F7F7F5;
      border-radius: 13px;
      box-shadow: 0 8px 18px rgba(17, 17, 17, .055);
    }

    .summary-item b {
      display: block;
      font-size: 20px;
    }

    .summary-item span {
      color: var(--muted);
      font-size: 13px;
    }

    .admin-panel {
      grid-column: 1 / -1;
      display: none;
      overflow: hidden;
    }

    .admin-close-btn {
      display: none;
    }

    .admin-panel.show {
      display: block;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      gap: 14px;
      padding: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      min-height: 44px;
      padding: 9px 11px;
      color: var(--ink);
      background: #fff;
    }

    .qty-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 52px;
      gap: 8px;
      align-items: center;
    }

    .qty-back {
      min-height: 44px;
      padding: 0;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      color: var(--ink);
      background: #F4F4F2;
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(17, 17, 17, .085);
    }

    .qty-back:hover {
      background: #E9E9E7;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.5;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
    }

    .admin-actions,
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .bulk-paste {
      min-height: 116px;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      background: #F8F8F6;
    }

    .field-help {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .drug-table {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .drug-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .drug-row:last-child { border-bottom: 0; }

    .drug-row span {
      overflow-wrap: anywhere;
      min-width: 0;
    }

    .admin-drug-fields {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(96px, .65fr);
      gap: 8px;
      min-width: 0;
    }

    .admin-drug-fields input {
      min-height: 38px;
      border-radius: 12px;
      background: #F8F8F6;
    }

    .admin-row-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .admin-row-actions .button-small {
      min-width: 34px;
      padding: 0 9px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      color: var(--muted);
      background: #E1E1DD;
      white-space: nowrap;
    }

    .status-pill.done {
      color: #111111;
      background: #9FAF9F;
    }

    .status-pill.not-found {
      color: #F4F4F2;
      background: #4D4D49;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: transparent;
      pointer-events: none;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      max-height: min(760px, calc(100vh - 32px));
      overflow: auto;
      background: #EDEDEA;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      pointer-events: auto;
    }

    .modal-backdrop.show .modal {
      animation: modalPopIn .22s cubic-bezier(.2, .82, .2, 1) both;
    }

    @keyframes modalPopIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .sheet-handle {
      display: none;
    }

    .modal-header {
      padding: 16px;
      background: #F5F5F3;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .modal-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .modal-body {
      padding: 16px;
      background: #EDEDEA;
    }

    .calc {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .calc button {
      min-height: 46px;
      color: var(--ink);
      background: #F4F4F2;
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .calc button:hover { background: #E3E3DF; }

    .calc .op {
      color: #686866;
      background: #e5e2dc;
    }

    .calc .wide {
      grid-column: span 2;
    }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 14px 16px 16px;
      background: #F5F5F3;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .not-found-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #302f2d;
      background: #E1E1DD;
      border: 1px solid #D1D1CC;
    }

    .not-found-btn:hover {
      background: #D8D8D3;
    }

    .not-found-icon {
      min-width: 50px;
      color: #302f2d;
      flex: 0 0 auto;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      z-index: 30;
      transform: translateX(-50%) translateY(120%);
      min-width: min(420px, calc(100vw - 28px));
      padding: 12px 14px;
      border-radius: var(--radius);
      color: #fff;
      background: rgba(23, 32, 42, .94);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: transform .2s ease, opacity .2s ease, visibility .2s ease;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      visibility: visible;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 920px) {
      .main {
        grid-template-columns: 1fr;
      }

      .cabinet-wrap {
        max-height: none;
      }

      .admin-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        min-height: 100dvh;
        overflow-x: hidden;
        background: #E9E9E7;
      }

      .shell {
        min-height: 100dvh;
        padding-bottom: 0;
      }

      .topbar {
        min-height: 54px;
        padding: 9px 15px;
        background: rgba(244, 244, 242, .90);
        box-shadow: 0 8px 22px rgba(17, 17, 17, .055);
        backdrop-filter: blur(14px);
      }

      .brand {
        min-width: 0;
      }

      .brand h1 {
        font-size: 17px;
        font-weight: 760;
      }

      .save-monitor {
        gap: 0;
        margin-left: auto;
        width: 28px;
        height: 24px;
        padding: 0;
        background: #DDDDD9;
        border-radius: 11px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, .72), 0 7px 16px rgba(17, 17, 17, .07);
      }

      .top-actions {
        display: none;
      }

      .mobile-actions {
        position: fixed;
        right: 14px;
        bottom: calc(14px + env(safe-area-inset-bottom));
        z-index: 19;
        display: block;
      }

      .mobile-actions summary {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        min-height: 56px;
        padding: 0;
        color: var(--ink);
        background: rgba(255, 255, 255, .78);
        border: 1px solid rgba(255, 255, 255, .88);
        border-radius: 999px;
        box-shadow: 0 18px 34px rgba(39, 36, 30, .16), inset 0 0 0 1px rgba(211, 205, 195, .36);
        cursor: pointer;
        user-select: none;
        list-style: none;
        backdrop-filter: blur(12px);
        transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      }

      .mobile-actions summary::-webkit-details-marker {
        display: none;
      }

      .mobile-actions[open] summary {
        transform: rotate(90deg);
        background: rgba(255, 255, 255, .92);
      }

      .menu-icon,
      .menu-icon::before,
      .menu-icon::after {
        display: block;
        width: 20px;
        height: 2px;
        border-radius: 999px;
        background: #5a5752;
      }

      .menu-icon {
        position: relative;
      }

      .menu-icon::before,
      .menu-icon::after {
        content: "";
        position: absolute;
        left: 0;
      }

      .menu-icon::before {
        top: -7px;
      }

      .menu-icon::after {
        top: 7px;
      }

      .mobile-actions-panel {
        position: absolute;
        right: 0;
        bottom: 64px;
        width: 158px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 8px;
        background: rgba(244, 244, 242, .94);
        border: 1px solid rgba(220, 220, 216, .82);
        border-radius: 18px;
        box-shadow: 0 18px 36px rgba(17, 17, 17, .14);
        backdrop-filter: blur(14px);
        animation: menuRollOut .22s cubic-bezier(.2, .8, .2, 1);
        transform-origin: bottom right;
      }

      .mobile-actions-panel button {
        min-height: 44px;
        border-radius: 999px;
        color: #fff;
        background: #111111;
        border: 1px solid #111111;
        box-shadow: 0 10px 20px rgba(17, 17, 17, .12);
        opacity: 0;
        animation: menuItemIn .26s cubic-bezier(.2, .8, .2, 1) forwards;
      }

      .mobile-actions-panel .button-secondary {
        color: var(--ink);
        background: #F8F8F6;
        border-color: #D5D5D1;
      }

      .mobile-actions-panel button:nth-child(2) {
        animation-delay: .045s;
      }

      .mobile-actions-panel button:nth-child(3) {
        animation-delay: .09s;
      }

      .main {
        width: 100%;
        min-height: calc(100dvh - 54px);
        padding: 5px 6px 0;
        display: block;
      }

      .cabinet-panel {
        height: calc(100dvh - 60px);
        padding: 0;
        display: grid;
        place-items: center;
        background: rgba(250, 250, 248, .78);
        border: 1px solid rgba(222, 222, 218, .78);

        top: 64px;
        left: 12px;
        right: 12px;
        z-index: 16;
        display: block;
        max-height: 224px;
        border: 1px solid rgba(255, 255, 255, .78);
        border-radius: 20px;
        background: rgba(232, 232, 228, .96);
        box-shadow: 0 18px 42px rgba(17, 17, 17, .15);
        backdrop-filter: blur(14px);

        opacity: 0;
        pointer-events: none;
        transition: transform .22s ease, opacity .22s ease;
        isolation: isolate;
      }

      .work-panel.has-location {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .work-panel.has-location::before {
        content: "";
        position: fixed;
        inset: -70px -8px -100dvh;
        z-index: -1;
        background: rgba(229, 227, 223, .38);
        backdrop-filter: blur(4px);

      .admin-drug-fields {
        grid-template-columns: 1fr;
      }

      }

  </style>
</head>

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function legacyGet(key) {
      try {
        return localStorage.getItem(key);
      } catch {
        return null;
      }
    }

    function legacySet(key, value) {
      try {
        localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
      } catch {
        // IndexedDB remains the primary store; localStorage is only a compatibility mirror.
      }
    }

    function legacyRemove(key) {
      try {
        localStorage.removeItem(key);
      } catch {
        // Ignore localStorage cleanup failures.
      }
    }

    function openInventoryDb() {
      if (!('indexedDB' in window)) return Promise.reject(new Error('IndexedDB unavailable'));
      if (openInventoryDb.promise) return openInventoryDb.promise;
      openInventoryDb.promise = new Promise((resolve, reject) => {
        const request = indexedDB.open('offline-medicine-cabinet-inventory', 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains('records')) {
            db.createObjectStore('records', { keyPath: 'key' });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error('IndexedDB open failed'));
      });
      return openInventoryDb.promise;
    }

    async function dbGet(key) {
      const db = await openInventoryDb();
      return new Promise((resolve, reject) => {
        const request = db.transaction('records', 'readonly').objectStore('records').get(key);
        request.onsuccess = () => resolve(request.result ? request.result.value : null);
        request.onerror = () => reject(request.error || new Error('IndexedDB read failed'));
      });
    }

    async function dbSet(key, value) {
      const db = await openInventoryDb();
      return new Promise((resolve, reject) => {
        const request = db.transaction('records', 'readwrite').objectStore('records').put({
          key,
          value: clone(value)
        });
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error || new Error('IndexedDB write failed'));
      });
    }

    async function dbRemove(key) {
      const db = await openInventoryDb();
      return new Promise((resolve, reject) => {
        const request = db.transaction('records', 'readwrite').objectStore('records').delete(key);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error || new Error('IndexedDB delete failed'));
      });
    }

    function persistRecord(key, value) {
      legacySet(key, value);
      dbSet(key, value).catch(() => {
        showToast('此瀏覽器無法使用 IndexedDB，已改用備援暫存');
      });
    }

    function removeRecord(key) {
      legacyRemove(key);
      dbRemove(key).catch(() => {});
    }

    function parseLegacyJson(value, fallback) {
      if (!value) return fallback;
      try {
        return JSON.parse(value);
      } catch {
        return fallback;
      }
    }

    async function loadConfig() {
      const embedded = clone(defaultConfig);
      const legacyCabinetId = legacyGet(storagePrefix + 'lastCabinetId');
      const dbCabinetId = await dbGet(storagePrefix + 'lastCabinetId').catch(() => null);
      const lastCabinetId = dbCabinetId || legacyCabinetId || embedded.cabinetId;
      const dbConfig = await dbGet(storagePrefix + 'config:' + lastCabinetId).catch(() => null);
      const legacyConfig = parseLegacyJson(legacyGet(storagePrefix + 'config:' + lastCabinetId), null);
      const saved = dbConfig || legacyConfig;
      if (!saved) return embedded;
      try {
        const normalized = normalizeConfig(saved);
        if (!dbConfig && legacyConfig) {
          persistRecord(storagePrefix + 'config:' + normalized.cabinetId, normalized);
          persistRecord(storagePrefix + 'lastCabinetId', normalized.cabinetId);
        }
        return normalized;
      } catch {
        return embedded;
      }
    }

    function normalizeConfig(nextConfig) {
      const allowedIds = new Set(fixedLocations.map((location) => location.id));
      const byId = new Map((Array.isArray(nextConfig.locations) ? nextConfig.locations : [])
        .filter((location) => allowedIds.has(String(location.id)))
        .map((location) => [String(location.id), location]));
      const normalized = {
        cabinetId: String(nextConfig.cabinetId || 'cabinet-' + Date.now()),
        cabinetName: String(nextConfig.cabinetName || '未命名藥櫃'),
        locations: fixedLocations.map((definition) => byId.get(definition.id) || definition)
      };
      normalized.locations = normalized.locations.map((location, index) => ({
        id: String(location.id || 'location-' + (index + 1)),
        name: String(location.name || '位置 ' + (index + 1)),
        items: Array.isArray(location.items)
          ? location.items.map((item) => ({
              drugName: String(item.drugName || '').trim(),
              slotNo: String(item.slotNo || '').trim()
            })).filter((item) => item.drugName)
          : []
      }));
      return normalized;
    }

      persistRecord(storagePrefix + 'lastCabinetId', config.cabinetId);

    async function loadEntries(cabinetId) {
      const key = storagePrefix + 'entries:' + cabinetId;
      const dbEntries = await dbGet(key).catch(() => null);
      const legacyEntries = parseLegacyJson(legacyGet(key), null);
      const saved = dbEntries || legacyEntries;
      if (!saved) return {};
      try {
        if (!dbEntries && legacyEntries) persistRecord(key, legacyEntries);
        return saved || {};
      } catch {
        return {};
      }
    }

    function evaluateQty(value) {
      const original = String(value || '').replace(/\s/g, '');
      const raw = original.replace(/×/g, '*');
      if (!raw) return '';
      if (/[+\-*]$/.test(raw)) return original;
      if (!/^[0-9.+*\-]+$/.test(raw)) return raw;
      try {
        const parts = raw.match(/[+-]?[^+-]+/g) || [];
        const total = parts.reduce((sum, part) => {
          const sign = part.startsWith('-') ? -1 : 1;
          const term = part.replace(/^[+-]/, '');
          if (!term) throw new Error('empty term');
          const factors = term.split('*');
          if (factors.some((factor) => factor === '' || Number.isNaN(Number(factor)))) {
            throw new Error('invalid factor');
          }
          const product = factors.reduce((subtotal, factor) => subtotal * Number(factor), 1);
          return sum + (sign * product);
        }, 0);
        return Number.isFinite(total) ? trimNumber(total) : raw;
      } catch {
        return raw;
      }
    }

    function trimNumber(number) {
      return String(Number(number.toFixed(4)));
    }

    function handleCalcKey(key) {
      const input = dom.qtyInput;
      if (key === 'clear') {
        input.value = '';
      } else if (key === 'back') {
        input.value = input.value.slice(0, -1);
      } else if (key === '=') {
        input.value = evaluateQty(input.value);
      } else {
        input.value += key === '*' ? '×' : key;
      }
      autoSaveDrugEntry();
    }

            item.drugName,
            entry.notFound ? '找不到庫存' : (entry.quantity || ''),
            entry.notFound ? '' : (entry.expiryDate || '')
          ]);
        });
      });

      return {
        fileName: safeFileName(config.cabinetName) + '_盤點結果.csv',
        text: '\ufeff' + rows.map((row) => row.map(csvCell).join(',')).join('\r\n'),
        downloadType: 'text/csv;charset=utf-8',
        shareTypes: ['text/csv', 'text/plain', 'application/vnd.ms-excel']
      };
    }

    function exportCsv() {
      const csv = createCsvExport();
      downloadText(
        csv.fileName,
        csv.text,
        csv.downloadType
      );
    }

    async function shareCsv() {
      const csv = createCsvExport();
      if (typeof File === 'undefined') {
        exportCsv();
        showToast('此瀏覽器不支援檔案分享，已改為下載 CSV');
        return;
      }

      if (navigator.share) {
        for (const type of csv.shareTypes) {
          const file = new File([csv.text], csv.fileName, { type });
          const shareData = {
            files: [file],
            title: config.cabinetName + ' 盤點結果',
            text: config.cabinetName + ' 盤點結果 CSV'
          };

          if (navigator.canShare?.(shareData)) {
            try {
              await navigator.share(shareData);
              showToast('已開啟分享選單');
              return;
            } catch (error) {
              if (error?.name === 'AbortError') return;
            }
          }
        }
      }

      exportCsv();
      showToast('此瀏覽器不支援檔案分享，已改為下載 CSV');
    }

    function exportConfig() {
      downloadText(
        safeFileName(config.cabinetName) + '_位置設定.json',
        JSON.stringify(config, null, 2),
        'application/json;charset=utf-8'
      );
    }

    async function applyConfigValue(nextConfig) {
      const oldCabinetId = config.cabinetId;
      config = normalizeConfig(nextConfig);
      currentLocationId = '';
      entries = await loadEntries(config.cabinetId);
      if (oldCabinetId !== config.cabinetId) {
        persistRecord(storagePrefix + 'lastCabinetId', config.cabinetId);
      }
      saveConfig();
      renderAll();
    }

    async function applyConfigFromText() {
      try {
        await applyConfigValue(JSON.parse(dom.configText.value));
        showToast('已套用位置設定');
      } catch (error) {
        showToast('JSON 格式無法讀取，請檢查逗號與括號');
      }
    }

    function importConfigFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          await applyConfigValue(JSON.parse(String(reader.result || '')));
          dom.configText.value = JSON.stringify(config, null, 2);
          showToast('已匯入位置設定');
        } catch {
          showToast('JSON 檔案無法讀取，請確認是位置設定備份檔');
        } finally {
          dom.importConfigInput.value = '';
        }
      };
      reader.onerror = () => {
        showToast('無法讀取此檔案');
        dom.importConfigInput.value = '';
      };
      reader.readAsText(file, 'utf-8');
    }

    function addDrugToLocation() {
      const location = getEditingLocation();
      const drugName = dom.drugNameInput.value.trim();
      const slotNo = dom.slotNoInput.value.trim();
      if (!location) return;
      if (!drugName) {
        showToast('請輸入藥品名稱');
        dom.drugNameInput.focus();
        return;
      }
      location.items.push({ drugName, slotNo });
      dom.drugNameInput.value = '';
      dom.slotNoInput.value = '';
      saveConfig();
      renderAll();
      showToast('已加入藥品');
    }

    function splitPastedLine(line) {
      if (line.includes('\t')) return line.split('\t');
      return line.split(',').map((cell) => cell.replace(/^"|"$/g, '').replace(/""/g, '"'));
    }

    function normalizeHeader(value) {
      return String(value || '').trim().toLowerCase().replace(/\s+/g, '');
    }

    function parseExcelPaste(text) {
      const rows = String(text || '')
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .split('\n')
        .map((line) => splitPastedLine(line).map((cell) => String(cell || '').trim()))
        .filter((row) => row.some(Boolean));

      if (!rows.length) return { items: [], hasLocationColumn: false };

      const firstRowHeaders = rows[0].map(normalizeHeader);
      const findColumn = (names) => firstRowHeaders.findIndex((header) => names.some((name) => header.includes(name)));
      let locationIndex = findColumn(['位置', '層架', '抽屜', 'location', 'loc']);
      let drugIndex = findColumn(['藥品名稱', '藥名', '品名', 'drugname', 'drug', 'name']);
      let slotIndex = findColumn(['料位號', '料位', 'slotno', 'slot', '格位']);
      const hasHeader = drugIndex >= 0 || slotIndex >= 0 || locationIndex >= 0;
      const dataRows = hasHeader ? rows.slice(1) : rows;

      if (!hasHeader) {
        if (rows[0].length >= 3) {
          locationIndex = 0;
          drugIndex = 1;
          slotIndex = 2;
        } else {
          locationIndex = -1;
          drugIndex = 0;
          slotIndex = 1;
        }
      } else if (drugIndex < 0) {
        drugIndex = locationIndex === 0 ? 1 : 0;
      }

      return {
        hasLocationColumn: locationIndex >= 0,
        items: dataRows.map((row) => ({
          locationName: locationIndex >= 0 ? String(row[locationIndex] || '').trim() : '',
          drugName: String(row[drugIndex] || '').trim(),
          slotNo: slotIndex >= 0 ? String(row[slotIndex] || '').trim() : ''
        })).filter((item) => item.drugName)
      };
    }

    function normalizeLocationKey(value) {
      return String(value || '').trim().toLowerCase().replace(/\s+/g, '');
    }

    function findLocationByPasteName(value) {
      const key = normalizeLocationKey(value);
      if (!key) return null;
      return config.locations.find((location) => {
        return normalizeLocationKey(location.id) === key || normalizeLocationKey(location.name) === key;
      }) || null;
    }

    function importPastedDrugs({ replace = false } = {}) {
      const parsed = parseExcelPaste(dom.bulkPasteInput.value);
      if (!parsed.items.length) {
        showToast('沒有讀到可匯入的藥品資料');
        dom.bulkPasteInput.focus();
        return;
      }

      const touchedLocationIds = new Set();
      const unmatchedLocations = new Set();
      const selectedLocation = getEditingLocation();

      if (replace) {
        const replaceTarget = parsed.hasLocationColumn ? '貼上內容中對應的位置' : '目前選取的位置';
        if (!confirm('覆蓋匯入會清除' + replaceTarget + '原本的藥品設定與已輸入盤點資料。確定要繼續嗎？')) return;
        if (parsed.hasLocationColumn) {
          parsed.items.forEach((item) => {
            const location = findLocationByPasteName(item.locationName);
            if (location && !touchedLocationIds.has(location.id)) {
              location.items = [];
              cleanEntriesForLocation(location.id);
              touchedLocationIds.add(location.id);
            }
          });
        } else if (selectedLocation) {
          selectedLocation.items = [];
          cleanEntriesForLocation(selectedLocation.id);
          touchedLocationIds.add(selectedLocation.id);
        }
      }

      let importedCount = 0;
      parsed.items.forEach((item) => {
        const location = parsed.hasLocationColumn ? findLocationByPasteName(item.locationName) : selectedLocation;
        if (!location) {
          if (item.locationName) unmatchedLocations.add(item.locationName);
          return;
        }
        location.items.push({ drugName: item.drugName, slotNo: item.slotNo });
        touchedLocationIds.add(location.id);
        importedCount += 1;
      });

      if (!importedCount) {
        showToast('找不到可匯入的位置，請確認位置欄名稱');
        return;
      }

      saveConfig();
      saveEntries();
      renderAll();
      const skipped = unmatchedLocations.size ? '，略過 ' + unmatchedLocations.size + ' 個未知位置' : '';
      showToast('已匯入 ' + importedCount + ' 筆藥品' + skipped);
    }

    function editDrugInLocation(index, field, value) {
      const location = getEditingLocation();
      if (!location || !location.items[index] || !['drugName', 'slotNo'].includes(field)) return;
      location.items[index][field] = value.trim();
      saveConfig();
      renderDrugStrip();
      renderCabinetArt();
      dom.configText.value = JSON.stringify(config, null, 2);
    }

    function remapLocationEntries(locationId, mapIndex) {
      const nextEntries = {};
      Object.entries(entries).forEach(([key, value]) => {
        if (!key.startsWith(locationId + '::')) {
          nextEntries[key] = value;
          return;
        }
        const oldIndex = Number(key.split('::')[1]);
        const newIndex = mapIndex(oldIndex);
        if (Number.isInteger(newIndex) && newIndex >= 0) {
          nextEntries[entryKey(locationId, newIndex)] = value;
        }
      });
      entries = nextEntries;
    }

    function moveDrugInLocation(index, direction) {
      const location = getEditingLocation();
      if (!location) return;
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= location.items.length) return;
      [location.items[index], location.items[targetIndex]] = [location.items[targetIndex], location.items[index]];
      remapLocationEntries(location.id, (oldIndex) => {
        if (oldIndex === index) return targetIndex;
        if (oldIndex === targetIndex) return index;
        return oldIndex;
      });
      saveConfig();
      saveEntries();
      renderAll();
      showToast('已調整順序');
    }

    function removeDrugFromLocation(index) {
      const location = getEditingLocation();
      if (!location) return;
      location.items.splice(index, 1);
      remapLocationEntries(location.id, (oldIndex) => {
        if (oldIndex === index) return -1;
        return oldIndex > index ? oldIndex - 1 : oldIndex;
      });
      saveConfig();
      saveEntries();
      renderAll();
    }

    function cleanEntriesForLocation(locationId) {
      Object.keys(entries).forEach((key) => {
        if (key.startsWith(locationId + '::')) delete entries[key];
      });
    }

    function clearLocation() {
      const location = getEditingLocation();
      if (!location) return;
      if (!confirm('確定要清空「' + location.name + '」的藥品設定嗎？')) return;
      location.items = [];
      cleanEntriesForLocation(location.id);
      saveConfig();
      saveEntries();
      renderAll();
      showToast('此位置已清空');
    }

    function resetDemo() {
      if (!confirm('確定要還原範例設定？目前位置設定會被覆蓋。')) return;
      config = clone(defaultConfig);
      entries = {};
      currentLocationId = '';
      removeRecord(storagePrefix + 'config:' + config.cabinetId);
      removeRecord(storagePrefix + 'entries:' + config.cabinetId);
      persistRecord(storagePrefix + 'lastCabinetId', config.cabinetId);
      renderAll();
      showToast('已還原範例設定');
    }

    function downloadStandaloneHtml() {
      const doc = document.documentElement.cloneNode(true);
      const configScript = doc.querySelector('#cabinet-config');
      configScript.textContent = '\n' + JSON.stringify(config, null, 2) + '\n';
      doc.querySelector('#drugModal')?.classList.remove('show');
      doc.querySelector('#adminPanel')?.classList.remove('show');
      const html = '<!doctype html>\n' + doc.outerHTML;
      downloadText(
        safeFileName(config.cabinetName) + '_離線盤點.html',
        html,
        'text/html;charset=utf-8'
      );
    }

    function downloadText(fileName, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      const text = String(value ?? '');
      return '"' + text.replace(/"/g, '""') + '"';
    }

    function safeFileName(name) {
      return String(name || '藥櫃').replace(/[\\/:*?"<>|]/g, '_');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }

    function showToast(message) {
      dom.toast.textContent = message;
      dom.toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        dom.toast.classList.remove('show');
      }, 2200);
    }

    function renderAll() {
      dom.title.textContent = config.cabinetName + ' 盤點';
      renderCabinetArt();
      renderDrugStrip();
      renderAdmin();
    }

    async function initApp() {
      config = await loadConfig();
      entries = await loadEntries(config.cabinetId);
      currentLocationId = '';
      renderAll();
    }

    dom.cabinetSvg.addEventListener('click', (event) => {
      const target = event.target.closest('[data-location-id]');
      if (!target) return;
      selectLocation(target.dataset.locationId);
    });

    dom.drugStrip.addEventListener('click', (event) => {
      const card = event.target.closest('[data-drug-index]');
      if (!card) return;
      openDrugModal(Number(card.dataset.drugIndex));
    });

    function toggleAdminPanel() {
      dom.adminPanel.classList.toggle('show');
      renderAdmin();
    }

    function closeAdminPanel() {
      dom.adminPanel.classList.remove('show');
    }

    dom.adminToggleBtn.addEventListener('click', toggleAdminPanel);
    dom.mobileAdminToggleBtn.addEventListener('click', () => {
      toggleAdminPanel();
      dom.mobileAdminToggleBtn.closest('details')?.removeAttribute('open');
    });
    dom.adminCloseBtn.addEventListener('click', closeAdminPanel);

    dom.exportCsvBtn.addEventListener('click', exportCsv);
    dom.shareCsvBtn.addEventListener('click', shareCsv);
    dom.mobileExportCsvBtn.addEventListener('click', () => {
      exportCsv();
      dom.mobileExportCsvBtn.closest('details')?.removeAttribute('open');
    });
    dom.mobileShareCsvBtn.addEventListener('click', () => {
      shareCsv();
      dom.mobileShareCsvBtn.closest('details')?.removeAttribute('open');
    });
    dom.exportConfigBtn.addEventListener('click', exportConfig);
    dom.importConfigBtn.addEventListener('click', () => dom.importConfigInput.click());
    dom.importConfigInput.addEventListener('change', () => importConfigFromFile(dom.importConfigInput.files?.[0]));
    dom.applyConfigBtn.addEventListener('click', applyConfigFromText);
    dom.resetDemoBtn.addEventListener('click', resetDemo);
    dom.downloadHtmlBtn.addEventListener('click', downloadStandaloneHtml);
    dom.addDrugBtn.addEventListener('click', addDrugToLocation);
    dom.clearLocationBtn.addEventListener('click', clearLocation);
    dom.bulkAppendBtn.addEventListener('click', () => importPastedDrugs({ replace: false }));
    dom.bulkReplaceBtn.addEventListener('click', () => importPastedDrugs({ replace: true }));
    dom.bulkClearBtn.addEventListener('click', () => {
      dom.bulkPasteInput.value = '';
      dom.bulkPasteInput.focus();
    });

    dom.cabinetNameInput.addEventListener('change', () => {
      config.cabinetName = dom.cabinetNameInput.value.trim() || '未命名藥櫃';
      saveConfig();
      renderAll();
    });

    dom.cabinetIdInput.addEventListener('change', () => {
      const oldCabinetId = config.cabinetId;
      const nextCabinetId = dom.cabinetIdInput.value.trim() || oldCabinetId;
      config.cabinetId = nextCabinetId;
      if (oldCabinetId !== nextCabinetId) {
        persistRecord(storagePrefix + 'entries:' + nextCabinetId, entries);
      }
      saveConfig();
      renderAll();
    });

    dom.locationSelect.addEventListener('change', () => {
      selectLocation(dom.locationSelect.value);
    });

    dom.closeDrugListBtn.addEventListener('click', closeDrugList);

    dom.adminDrugList.addEventListener('click', (event) => {
      const removeButton = event.target.closest('[data-remove-index]');
      if (removeButton) {
        removeDrugFromLocation(Number(removeButton.dataset.removeIndex));
        return;
      }
      const moveButton = event.target.closest('[data-move-index]');
      if (moveButton) {
        moveDrugInLocation(Number(moveButton.dataset.moveIndex), Number(moveButton.dataset.direction));
      }
    });

    dom.adminDrugList.addEventListener('change', (event) => {
      const input = event.target.closest('[data-edit-index]');
      if (!input) return;
      editDrugInLocation(Number(input.dataset.editIndex), input.dataset.editField, input.value);
    });

    dom.closeModalBtn.addEventListener('click', closeDrugModal);
    dom.modal.addEventListener('click', (event) => {
      if (event.target === dom.modal) closeDrugModal();
    });
    dom.saveEntryBtn.addEventListener('click', saveDrugEntry);
    dom.deleteEntryBtn.addEventListener('click', deleteDrugEntry);
    dom.notFoundBtn.addEventListener('click', markDrugNotFound);
    dom.expiryInput.addEventListener('input', () => autoSaveDrugEntry());
    dom.expiryInput.addEventListener('change', () => autoSaveDrugEntry({ immediate: true }));

    document.querySelector('.calc').addEventListener('click', (event) => {
      const button = event.target.closest('[data-key]');
      if (!button) return;
      handleCalcKey(button.dataset.key);
    });
    dom.qtyBackBtn.addEventListener('click', () => handleCalcKey('back'));

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && dom.modal.classList.contains('show')) {
        closeDrugModal();
      } else if (event.key === 'Escape' && dom.adminPanel.classList.contains('show')) {
        closeAdminPanel();
      }
    });

    initApp();
  </script>
</body>
</html>
