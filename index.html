<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智慧藥櫃盤點入口</title>
  <style>
    :root {
      --bg: #EFEFEC;
      --panel: rgba(255, 255, 255, .86);
      --panel-strong: #F7F7F5;
      --ink: #1F1F1D;
      --muted: #74736E;
      --line: #D7D6D1;
      --line-strong: #C6C5BF;
      --accent: #F28C28;
      --accent-soft: #F4D7B8;
      --green: #8FA48F;
      --shadow: 0 20px 50px rgba(34, 34, 31, .12);
      --soft-shadow: 0 10px 28px rgba(34, 34, 31, .09);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 8%, rgba(255, 255, 255, .84), transparent 28%),
        linear-gradient(135deg, #F6F6F3 0%, #E5E4E0 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 14px;
      padding: 0 16px;
      color: #fff;
      background: var(--ink);
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--soft-shadow);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 34px rgba(34, 34, 31, .14);
    }

    button.secondary {
      color: var(--ink);
      background: #E2E2DE;
      border: 1px solid var(--line);
    }

    button.accent {
      color: #20160c;
      background: var(--accent);
    }

    button.danger {
      color: #fff;
      background: #A35B4E;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
    }

    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 18px 16px 32px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 0 -16px 16px;
      padding: 12px 16px;
      background: rgba(239, 239, 236, .86);
      border-bottom: 1px solid rgba(198, 197, 191, .72);
      backdrop-filter: blur(16px);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(24px, 5.8vw, 40px);
      line-height: 1.05;
    }

    .brand span,
    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(250px, 340px);
      gap: 14px;
      margin-bottom: 14px;
    }

    .panel {
      border: 1px solid rgba(198, 197, 191, .72);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-main {
      padding: 22px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .6), transparent),
        var(--panel);
    }

    .hero-main p {
      max-width: 620px;
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.8;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px;
      background: #E4E4E0;
    }

    .stat {
      min-height: 92px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .72);
      box-shadow: 0 8px 20px rgba(34, 34, 31, .06);
    }

    .stat strong {
      display: block;
      font-size: 30px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .52);
    }

    .section-head h2 {
      font-size: 18px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .filterbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 18px 0;
    }

    .filter-btn {
      min-height: 34px;
      padding: 0 12px;
      color: var(--ink);
      background: #E5E5E1;
      box-shadow: none;
      border: 1px solid transparent;
    }

    .filter-btn.active {
      background: #fff;
      border-color: var(--line-strong);
      box-shadow: 0 8px 18px rgba(34, 34, 31, .08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      padding: 18px;
    }

    .cabinet-card {
      display: flex;
      min-height: 142px;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      color: var(--ink);
      text-decoration: none;
      background: #F9F9F7;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--soft-shadow);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .cabinet-card:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      box-shadow: 0 18px 38px rgba(34, 34, 31, .13);
    }

    .cabinet-card strong {
      font-size: 22px;
      line-height: 1.2;
    }

    .cabinet-card .group {
      display: inline-flex;
      width: fit-content;
      min-height: 28px;
      align-items: center;
      margin-top: 12px;
      padding: 2px 10px;
      color: #2a332a;
      background: var(--green);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .cabinet-card .file {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      background: #F8F8F6;
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
    }

    .manager {
      display: none;
      margin-top: 14px;
    }

    .manager.show {
      display: block;
    }

    .manager-grid {
      display: grid;
      grid-template-columns: minmax(240px, 340px) minmax(0, 1fr);
      gap: 14px;
      padding: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 12px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .field-help {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .table {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .row:last-child {
      border-bottom: 0;
    }

    .row-main {
      min-width: 0;
    }

    .row-main strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .row-main span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .row-actions {
      display: flex;
      gap: 6px;
    }

    .small-btn {
      min-width: 36px;
      min-height: 36px;
      padding: 0 10px;
      box-shadow: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      z-index: 20;
      min-width: 220px;
      max-width: calc(100vw - 32px);
      padding: 12px 16px;
      color: #fff;
      text-align: center;
      background: rgba(32, 31, 29, .92);
      border-radius: 999px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translate(-50%, 14px);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: flex-start;
      }

      .hero,
      .manager-grid {
        grid-template-columns: 1fr;
      }

      .topbar .toolbar {
        justify-content: flex-end;
      }

      .topbar button {
        min-height: 38px;
        padding: 0 12px;
      }

      .hero-main {
        padding: 18px;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>智慧藥櫃盤點入口</h1>
        <span>選擇負責藥櫃，或由維護者更新入口清單</span>
      </div>
      <div class="toolbar">
        <button id="managerToggleBtn" class="secondary">入口清單管理</button>
      </div>
    </header>

    <section class="hero">
      <div class="panel hero-main">
        <h2>藥櫃盤點首頁</h2>
        <p>這裡會依照 `cabinets.json` 顯示所有藥櫃。新增藥櫃時，上傳新的藥櫃 HTML，再用下方管理器更新清單並下載新的 `cabinets.json`。</p>
      </div>
      <div class="panel stats">
        <div class="stat">
          <strong id="cabinetCount">0</strong>
          <span>藥櫃數</span>
        </div>
        <div class="stat">
          <strong id="groupCount">0</strong>
          <span>分類數</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>藥櫃列表</h2>
          <p class="muted">藥師點選卡片即可進入盤點頁。</p>
        </div>
      </div>
      <div id="filterbar" class="filterbar" aria-label="藥櫃分類"></div>
      <div id="cabinetGrid" class="grid" aria-live="polite"></div>
    </section>

    <section id="managerPanel" class="panel manager" aria-label="入口清單管理">
      <div class="section-head">
        <div>
          <h2>入口清單管理</h2>
          <p class="muted">新增或修改後，下載 `cabinets.json`，再上傳覆蓋 GitHub 裡同名檔案。</p>
        </div>
        <div class="toolbar">
          <button id="downloadJsonBtn" class="accent">下載 cabinets.json</button>
          <button id="importJsonBtn" class="secondary">匯入清單 JSON</button>
          <input id="importJsonInput" type="file" accept=".json,application/json" hidden>
        </div>
      </div>
      <div class="manager-grid">
        <div>
          <div class="field">
            <label for="nameInput">藥櫃名稱</label>
            <input id="nameInput" autocomplete="off" placeholder="例如 口服藥 1">
          </div>
          <div class="field">
            <label for="fileInput">檔案名稱</label>
            <input id="fileInput" autocomplete="off" placeholder="例如 oral-1.html">
            <div class="field-help">檔案必須已上傳到同一個 GitHub Pages 資料夾。</div>
          </div>
          <div class="field">
            <label for="groupInput">分類</label>
            <input id="groupInput" autocomplete="off" placeholder="例如 口服藥、外用藥、水劑">
          </div>
          <div class="actions">
            <button id="saveBtn">新增</button>
            <button id="cancelEditBtn" class="secondary">取消編輯</button>
            <button id="clearFormBtn" class="secondary">清空欄位</button>
          </div>
        </div>
        <div>
          <div class="field">
            <label>目前入口清單</label>
            <div id="managerList" class="table"></div>
          </div>
          <div class="field">
            <label for="jsonText">清單 JSON 預覽</label>
            <textarea id="jsonText" spellcheck="false"></textarea>
          </div>
          <div class="actions">
            <button id="applyTextBtn" class="secondary">套用文字清單</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const fallbackCabinets = [
      { name: '口服藥 1', file: 'oral-1.html', group: '口服藥' }
    ];

    let cabinets = [];
    let activeGroup = '全部';
    let editingIndex = -1;
    let toastTimer = 0;

    const $ = (selector) => document.querySelector(selector);
    const dom = {
      cabinetCount: $('#cabinetCount'),
      groupCount: $('#groupCount'),
      filterbar: $('#filterbar'),
      cabinetGrid: $('#cabinetGrid'),
      managerToggleBtn: $('#managerToggleBtn'),
      managerPanel: $('#managerPanel'),
      nameInput: $('#nameInput'),
      fileInput: $('#fileInput'),
      groupInput: $('#groupInput'),
      saveBtn: $('#saveBtn'),
      cancelEditBtn: $('#cancelEditBtn'),
      clearFormBtn: $('#clearFormBtn'),
      managerList: $('#managerList'),
      jsonText: $('#jsonText'),
      downloadJsonBtn: $('#downloadJsonBtn'),
      importJsonBtn: $('#importJsonBtn'),
      importJsonInput: $('#importJsonInput'),
      applyTextBtn: $('#applyTextBtn'),
      toast: $('#toast')
    };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }

    function normalizeCabinets(value) {
      return (Array.isArray(value) ? value : [])
        .map((item) => ({
          name: String(item.name || '').trim(),
          file: String(item.file || '').trim(),
          group: String(item.group || '未分類').trim() || '未分類'
        }))
        .filter((item) => item.name && item.file);
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      dom.toast.textContent = message;
      dom.toast.classList.add('show');
      toastTimer = setTimeout(() => dom.toast.classList.remove('show'), 1800);
    }

    function groups() {
      return [...new Set(cabinets.map((item) => item.group || '未分類'))];
    }

    function renderFilters() {
      const allGroups = ['全部', ...groups()];
      if (!allGroups.includes(activeGroup)) activeGroup = '全部';
      dom.filterbar.innerHTML = allGroups.map((group) => `
        <button class="filter-btn ${group === activeGroup ? 'active' : ''}" data-group="${escapeAttr(group)}">${escapeHtml(group)}</button>
      `).join('');
    }

    function renderCards() {
      const visibleCabinets = activeGroup === '全部'
        ? cabinets
        : cabinets.filter((item) => item.group === activeGroup);

      dom.cabinetCount.textContent = cabinets.length;
      dom.groupCount.textContent = groups().length;

      if (!visibleCabinets.length) {
        dom.cabinetGrid.innerHTML = '<div class="empty-state">目前沒有藥櫃。請開啟入口清單管理新增。</div>';
        return;
      }

      dom.cabinetGrid.innerHTML = visibleCabinets.map((item) => `
        <a class="cabinet-card" href="${escapeAttr(item.file)}">
          <div>
            <strong>${escapeHtml(item.name)}</strong>
            <span class="group">${escapeHtml(item.group || '未分類')}</span>
          </div>
          <span class="file">${escapeHtml(item.file)}</span>
        </a>
      `).join('');
    }

    function renderManagerList() {
      if (!cabinets.length) {
        dom.managerList.innerHTML = '<div class="empty-state">目前沒有入口項目。</div>';
        return;
      }

      dom.managerList.innerHTML = cabinets.map((item, index) => `
        <div class="row">
          <div class="row-main">
            <strong>${escapeHtml(item.name)}</strong>
            <span>${escapeHtml(item.group || '未分類')} · ${escapeHtml(item.file)}</span>
          </div>
          <div class="row-actions">
            <button class="secondary small-btn" data-move="${index}" data-direction="-1" ${index === 0 ? 'disabled' : ''} title="上移">↑</button>
            <button class="secondary small-btn" data-move="${index}" data-direction="1" ${index === cabinets.length - 1 ? 'disabled' : ''} title="下移">↓</button>
            <button class="secondary small-btn" data-edit="${index}" title="編輯">編輯</button>
            <button class="danger small-btn" data-remove="${index}" title="刪除">刪除</button>
          </div>
        </div>
      `).join('');
    }

    function renderJson() {
      dom.jsonText.value = JSON.stringify(cabinets, null, 2);
    }

    function renderAll() {
      renderFilters();
      renderCards();
      renderManagerList();
      renderJson();
    }

    function clearForm() {
      editingIndex = -1;
      dom.nameInput.value = '';
      dom.fileInput.value = '';
      dom.groupInput.value = '';
      dom.saveBtn.textContent = '新增';
    }

    function saveForm() {
      const item = {
        name: dom.nameInput.value.trim(),
        file: dom.fileInput.value.trim(),
        group: dom.groupInput.value.trim() || '未分類'
      };

      if (!item.name) {
        showToast('請輸入藥櫃名稱');
        dom.nameInput.focus();
        return;
      }

      if (!item.file) {
        showToast('請輸入檔案名稱');
        dom.fileInput.focus();
        return;
      }

      if (editingIndex >= 0) {
        cabinets[editingIndex] = item;
        showToast('已更新入口項目');
      } else {
        cabinets.push(item);
        showToast('已新增入口項目');
      }

      clearForm();
      renderAll();
    }

    function editItem(index) {
      const item = cabinets[index];
      if (!item) return;
      editingIndex = index;
      dom.nameInput.value = item.name;
      dom.fileInput.value = item.file;
      dom.groupInput.value = item.group || '';
      dom.saveBtn.textContent = '儲存修改';
      dom.nameInput.focus();
    }

    function removeItem(index) {
      const item = cabinets[index];
      if (!item) return;
      if (!confirm('確定要從入口清單移除「' + item.name + '」嗎？這不會刪除 HTML 檔案。')) return;
      cabinets.splice(index, 1);
      clearForm();
      renderAll();
      showToast('已移除入口項目');
    }

    function moveItem(index, direction) {
      const target = index + direction;
      if (target < 0 || target >= cabinets.length) return;
      [cabinets[index], cabinets[target]] = [cabinets[target], cabinets[index]];
      clearForm();
      renderAll();
    }

    function downloadText(fileName, text, type = 'application/json;charset=utf-8') {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function downloadCabinetsJson() {
      downloadText('cabinets.json', JSON.stringify(cabinets, null, 2));
      showToast('已下載 cabinets.json');
    }

    function applyJsonText() {
      try {
        const nextCabinets = normalizeCabinets(JSON.parse(dom.jsonText.value));
        cabinets = nextCabinets;
        activeGroup = '全部';
        clearForm();
        renderAll();
        showToast('已套用文字清單');
      } catch {
        showToast('JSON 格式無法讀取');
      }
    }

    function importJsonFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          cabinets = normalizeCabinets(JSON.parse(String(reader.result || '')));
          activeGroup = '全部';
          clearForm();
          renderAll();
          showToast('已匯入清單');
        } catch {
          showToast('清單 JSON 無法讀取');
        } finally {
          dom.importJsonInput.value = '';
        }
      };
      reader.onerror = () => {
        showToast('無法讀取此檔案');
        dom.importJsonInput.value = '';
      };
      reader.readAsText(file, 'utf-8');
    }

    async function loadCabinets() {
      try {
        const response = await fetch('cabinets.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!response.ok) throw new Error('not found');
        cabinets = normalizeCabinets(await response.json());
      } catch {
        cabinets = normalizeCabinets(fallbackCabinets);
      }
      renderAll();
    }

    dom.managerToggleBtn.addEventListener('click', () => {
      dom.managerPanel.classList.toggle('show');
      dom.managerToggleBtn.textContent = dom.managerPanel.classList.contains('show') ? '關閉管理' : '入口清單管理';
    });

    dom.filterbar.addEventListener('click', (event) => {
      const button = event.target.closest('[data-group]');
      if (!button) return;
      activeGroup = button.dataset.group;
      renderAll();
    });

    dom.saveBtn.addEventListener('click', saveForm);
    dom.cancelEditBtn.addEventListener('click', clearForm);
    dom.clearFormBtn.addEventListener('click', clearForm);
    dom.downloadJsonBtn.addEventListener('click', downloadCabinetsJson);
    dom.importJsonBtn.addEventListener('click', () => dom.importJsonInput.click());
    dom.importJsonInput.addEventListener('change', () => importJsonFile(dom.importJsonInput.files?.[0]));
    dom.applyTextBtn.addEventListener('click', applyJsonText);

    dom.managerList.addEventListener('click', (event) => {
      const editButton = event.target.closest('[data-edit]');
      if (editButton) {
        editItem(Number(editButton.dataset.edit));
        return;
      }

      const removeButton = event.target.closest('[data-remove]');
      if (removeButton) {
        removeItem(Number(removeButton.dataset.remove));
        return;
      }

      const moveButton = event.target.closest('[data-move]');
      if (moveButton) {
        moveItem(Number(moveButton.dataset.move), Number(moveButton.dataset.direction));
      }
    });

    loadCabinets();
  </script>
</body>
</html>
